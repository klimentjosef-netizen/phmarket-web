<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#186E31"/>
      <stop offset="100%" style="stop-color:#1E6935"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <circle cx="950" cy="315" r="280" fill="rgba(255,255,255,0.04)"/>
  <!-- Big 500 Kč -->
  <text x="820" y="340" fill="rgba(255,255,255,0.08)" font-family="system-ui, sans-serif" font-size="200" font-weight="900">500</text>
  <!-- Coin stack -->
  <g transform="translate(920, 380)" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.18)" stroke-width="2">
    <ellipse cx="50" cy="80" rx="50" ry="15"/>
    <ellipse cx="50" cy="65" rx="50" ry="15"/>
    <ellipse cx="50" cy="50" rx="50" ry="15"/>
    <ellipse cx="50" cy="35" rx="50" ry="15"/>
    <ellipse cx="50" cy="20" rx="50" ry="15"/>
  </g>
  <!-- Down arrow (price) -->
  <g transform="translate(1050, 150)" stroke="rgba(255,255,255,0.2)" stroke-width="4" fill="none">
    <line x1="0" y1="0" x2="0" y2="80"/>
    <polyline points="-20,60 0,80 20,60"/>
  </g>
  <!-- Text -->
  <text x="80" y="230" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">
    <tspan x="80" dy="0">Jak ušetřit 500 Kč</tspan>
    <tspan x="80" dy="60">měsíčně na palivu?</tspan>
  </text>
  <text x="80" y="380" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, sans-serif" font-size="22">
    <tspan x="80" dy="0">Seznamte se s PHMARKET</tspan>
  </text>
  <rect x="80" y="510" width="140" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="150" y="534" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">PHMarket</text>
</svg>
