<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Decorative -->
  <circle cx="1000" cy="200" r="250" fill="rgba(24,110,49,0.15)"/>
  <circle cx="200" cy="500" r="180" fill="rgba(24,110,49,0.1)"/>
  <!-- Oil drop icon -->
  <g transform="translate(870, 150)">
    <path d="M80 0 C80 0 160 100 160 150 C160 194 124 230 80 230 C36 230 0 194 0 150 C0 100 80 0 80 0Z" fill="rgba(24,110,49,0.3)" stroke="rgba(24,110,49,0.5)" stroke-width="3"/>
    <path d="M80 40 C80 40 130 110 130 145 C130 173 108 195 80 195 C52 195 30 173 30 145 C30 110 80 40 80 40Z" fill="rgba(24,110,49,0.2)"/>
    <!-- B0 label -->
    <text x="80" y="165" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="36" font-weight="700" text-anchor="middle">B0</text>
  </g>
  <!-- Molecule dots -->
  <g fill="rgba(75,145,109,0.3)">
    <circle cx="950" cy="420" r="8"/><circle cx="980" cy="400" r="6"/><circle cx="1010" cy="430" r="10"/>
    <circle cx="940" cy="460" r="5"/><circle cx="1000" cy="470" r="7"/>
    <line x1="950" y1="420" x2="980" y2="400" stroke="rgba(75,145,109,0.2)" stroke-width="2"/>
    <line x1="980" y1="400" x2="1010" y2="430" stroke="rgba(75,145,109,0.2)" stroke-width="2"/>
    <line x1="950" y1="420" x2="940" y2="460" stroke="rgba(75,145,109,0.2)" stroke-width="2"/>
    <line x1="1010" y1="430" x2="1000" y2="470" stroke="rgba(75,145,109,0.2)" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="80" y="260" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">
    <tspan x="80" dy="0">Nafta bez biosložky</tspan>
  </text>
  <text x="80" y="340" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, sans-serif" font-size="22">
    <tspan x="80" dy="0">Co to vlastně znamená a proč je</tspan>
    <tspan x="80" dy="32">kolem ní takový poprask?</tspan>
  </text>
  <rect x="80" y="510" width="140" height="36" rx="18" fill="rgba(24,110,49,0.4)"/>
  <text x="150" y="534" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">PHMarket</text>
</svg>
