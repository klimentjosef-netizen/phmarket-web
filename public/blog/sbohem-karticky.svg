<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#186E31"/>
      <stop offset="100%" style="stop-color:#0D4F3D"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <circle cx="1000" cy="300" r="300" fill="rgba(255,255,255,0.05)"/>
  <circle cx="950" cy="350" r="200" fill="rgba(255,255,255,0.03)"/>
  <!-- Phone icon -->
  <g transform="translate(880, 140)">
    <rect x="0" y="0" width="120" height="220" rx="20" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
    <rect x="15" y="30" width="90" height="140" rx="5" fill="rgba(255,255,255,0.08)"/>
    <circle cx="60" cy="200" r="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <rect x="40" y="10" width="40" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <!-- Checkmark on screen -->
    <polyline points="35,90 50,110 85,70" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Crossed out card -->
  <g transform="translate(860, 400)" opacity="0.2">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="none" stroke="white" stroke-width="3"/>
    <rect x="0" y="25" width="160" height="20" fill="rgba(255,255,255,0.3)"/>
    <line x1="-10" y1="110" x2="170" y2="-10" stroke="white" stroke-width="4"/>
  </g>
  <!-- Text -->
  <text x="80" y="240" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" letter-spacing="-1">
    <tspan x="80" dy="0">Sbohem, plastové</tspan>
    <tspan x="80" dy="58">kartičky!</tspan>
  </text>
  <text x="80" y="390" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, sans-serif" font-size="22">
    <tspan x="80" dy="0">Proč digitální přehled cen mění</tspan>
    <tspan x="80" dy="32">způsob, jakým tankujeme</tspan>
  </text>
  <rect x="80" y="510" width="140" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="150" y="534" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">PHMarket</text>
</svg>
